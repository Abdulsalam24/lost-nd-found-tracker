version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lostfound-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lostfound
      POSTGRES_PASSWORD: lostfound_dev
      POSTGRES_DB: lostfound_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lostfound-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/lostfound-assets --ignore-existing;
      mc anonymous set download local/lostfound-assets/thumbnails;
      exit 0;
      "

volumes:
  pgdata:
  minio_data:
